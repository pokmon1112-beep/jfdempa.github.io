                </div>

                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 relative z-10">
                    <div class="flex justify-between items-center mb-3">

                    </div>
                    <div id="dex-abilities" class="flex flex-wrap gap-2"></div>

            <div id="view-calculator" class="p-4 space-y-4 hidden">

        <nav class="absolute bottom-0 w-full bg-white border-t border-slate-200 flex justify-around items-center pb-safe pt-2 pb-2 z-30">

        <div id="ability-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity">
            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl scale-95 transition-transform duration-200" id="ability-modal-content">

                   <div class="p-2 bg-yellow-100 rounded-full"><i data-lucide="zap" class="text-yellow-600 w-5 h-5"></i></div>

               </div>

               <button id="ability-modal-close" class="mt-5 w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl shadow-md transition-all">了解</button>

    <script>
        const zaExclusives = [
            {
                name: "超級沙漠蜻蜓 (Z-A)",
                types: ["地面", "龍"],
                abilities: [{name: "沙之力", isHidden: false, effect: "在沙暴天氣時，岩石屬性、地面屬性和鋼屬性的招式威力會提高。"}],
                stats: { hp: 80, atk: 130, def: 100, spa: 80, spd: 100, spe: 130 },
                sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/330.png"
            },
            {
                name: "超級甲賀忍蛙 (Z-A)",
                types: ["水", "惡"],
                abilities: [{name: "牽絆變身", isHidden: false, effect: "打倒對手時，會與訓練家產生牽絆而變身，各項能力提升，且飛水手裏劍威力增加。"}],
                stats: { hp: 72, atk: 145, def: 67, spa: 153, spd: 71, spe: 132 },
                sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10116.png"
            },
            {
                name: "基格爾德 (完全體型態)",
                types: ["龍", "地面"],
                abilities: [{name: "群聚變形", isHidden: false, effect: "HP降到一半以下時，細胞會群聚起來變身為完全體型態。"}],
                stats: { hp: 216, atk: 100, def: 121, spa: 91, spd: 95, spe: 85 },
                sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/718-complete.png"
            }
        ];

        let pokemonDB = [...zaExclusives];

        const typeColors = {
            "一般": "bg-gray-400", "火": "bg-red-500", "水": "bg-blue-500", "草": "bg-green-500", "電": "bg-yellow-400 text-slate-800", 
            "冰": "bg-cyan-300 text-slate-800", "格鬥": "bg-orange-600", "毒": "bg-purple-500", "地面": "bg-yellow-600", "飛行": "bg-indigo-300", 
            "超能力": "bg-pink-500", "蟲": "bg-lime-500", "岩石": "bg-yellow-700", "幽靈": "bg-indigo-700", "龍": "bg-indigo-600", 
            "惡": "bg-slate-700", "鋼": "bg-slate-400", "妖精": "bg-pink-400"
        };

        let dexIndex = 0; let atkIndex = 0; let defIndex = 1;

        function calculateStat(base, ev, iv, natureMod, isHp) {
            const level = 50;
            if (isHp) return Math.floor(((2 * base + iv + Math.floor(ev / 4)) * level) / 100) + level + 10;
            const raw = Math.floor(((2 * base + iv + Math.floor(ev / 4)) * level) / 100) + 5;
            return Math.floor(raw * natureMod);
        }

        function calculateDamage(params) {
            const { level, power, atkStat, atkStage, atkItem, isBurned, isPhysical, defStat, defStage, defItem, effectiveness, stab, weather } = params;
            if (power === 0) return { minDmg: 0, maxDmg: 0 };

            let atkMod = atkStage >= 0 ? (2 + atkStage) / 2 : 2 / (2 - atkStage);
            let defMod = defStage >= 0 ? (2 + defStage) / 2 : 2 / (2 - defStage);

            let finalAtk = Math.floor(atkStat * atkMod);
            let finalDef = Math.floor(defStat * defMod);

            if (atkItem === '1.5') finalAtk = Math.floor(finalAtk * 1.5); 
            if (defItem === '1.5e') finalDef = Math.floor(finalDef * 1.5); 

            let baseDmg = Math.floor(Math.floor((Math.floor((2 * level) / 5 + 2) * power * finalAtk) / finalDef) / 50) + 2;
            baseDmg = Math.floor(baseDmg * weather);

            let minDmg = Math.floor(baseDmg * 0.85);
            let maxDmg = Math.floor(baseDmg * 1.00);

            minDmg = Math.floor(minDmg * stab); maxDmg = Math.floor(maxDmg * stab);
            minDmg = Math.floor(minDmg * effectiveness); maxDmg = Math.floor(maxDmg * effectiveness);

            if (isBurned && isPhysical) {
                minDmg = Math.floor(minDmg * 0.5); maxDmg = Math.floor(maxDmg * 0.5);
            }
            if (atkItem === '1.3') {
                minDmg = Math.floor(minDmg * 1.3); maxDmg = Math.floor(maxDmg * 1.3);
            }
            return { minDmg, maxDmg };
        }

        function formatVariantName(engName, baseZhName) {
            if (!engName.includes('-')) return baseZhName;
            if (engName.includes('-mega-x')) return '超級' + baseZhName + ' X';
            if (engName.includes('-mega-y')) return '超級' + baseZhName + ' Y';
            if (engName.includes('-mega')) return '超級' + baseZhName;
            if (engName.includes('-primal')) return '原始' + baseZhName;
            if (engName.includes('-alola')) return baseZhName + ' (阿羅拉)';
            if (engName.includes('-galar')) return baseZhName + ' (伽勒爾)';
            if (engName.includes('-hisui')) return baseZhName + ' (洗翠)';
            if (engName.includes('-paldea')) return baseZhName + ' (帕底亞)';
            return baseZhName + ' (' + engName.split('-').slice(1).join(' ') + ')';
        }

        // 修改為一般函數而非 async，避免一開始阻塞主執行緒
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const dexSearch = document.getElementById('pokedex-search');
            const atkSearch = document.getElementById('calc-atk-search');
            const defSearch = document.getElementById('calc-def-search');
            
            const modal = document.getElementById('ability-modal');
            const modalContent = document.getElementById('ability-modal-content');
            const modalTitle = document.getElementById('ability-modal-title');
            const modalDesc = document.getElementById('ability-modal-desc');
            const modalClose = document.getElementById('ability-modal-close');

            function showAbilityModal(name, effect) {
                modalTitle.innerText = name;
                modalDesc.innerText = effect || "此特性的詳細說明尚未在資料庫中解鎖。";
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                }, 10);
            }

            modalClose.addEventListener('click', () => {
                modal.classList.add('opacity-0');
                modalContent.classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 200);
            });

            function setupAutocomplete(input, dropdownId, setIndexCb, initialIndex) {
                const dropdown = document.getElementById(dropdownId);
                input.value = pokemonDB[initialIndex] ? pokemonDB[initialIndex].name : "";
                
                input.addEventListener('input', (e) => {
                    const val = e.target.value.trim().toLowerCase();
                    dropdown.innerHTML = '';
                    
                    const filtered = val 
                        ? pokemonDB.map((m, i) => ({...m, idx: i})).filter(m => m.name.toLowerCase().includes(val)).slice(0, 50)
                        : pokemonDB.map((m, i) => ({...m, idx: i})).slice(0, 50);

                    if (filtered.length === 0) {
                        dropdown.innerHTML = '<div class="p-3 text-slate-500 text-sm text-center">找不到寶可夢</div>';
                    } else {
                        filtered.forEach(mon => {
                            const div = document.createElement('div');
                            div.className = "p-2 border-b border-slate-100 hover:bg-emerald-50 cursor-pointer flex items-center gap-3";
                            div.innerHTML = `<img src="${mon.sprite}" class="w-8 h-8 object-contain bg-slate-100 rounded-full"><span class="font-bold text-slate-700 text-sm">${mon.name}</span>`;
                            div.addEventListener('click', () => {
                                input.value = mon.name;
                                dropdown.classList.add('hidden');
                                setIndexCb(mon.idx);
                            });
                            dropdown.appendChild(div);
                        });
                    }
                    dropdown.classList.remove('hidden');
                });
                input.addEventListener('focus', () => input.dispatchEvent(new Event('input')));
                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden');
                });
            }

            function renderPokedex() {
                const mon = pokemonDB[dexIndex];
                if(!mon) return;
                
                document.getElementById('dex-sprite').src = mon.sprite;
                document.getElementById('dex-name').innerText = mon.name;
                document.getElementById('dex-types').innerHTML = mon.types.map(t => 
                    `<span class="${typeColors[t] || 'bg-slate-500 text-white'} px-3 py-1 rounded-full text-xs font-bold shadow-sm">${t}</span>`
                ).join('');

                const abilitiesContainer = document.getElementById('dex-abilities');
                abilitiesContainer.innerHTML = '';
                mon.abilities.forEach(a => {
                    const span = document.createElement('span');
                    span.className = `px-3 py-2 rounded-lg text-xs font-bold shadow-sm cursor-pointer transition-transform hover:scale-105 active:scale-95 ${a.isHidden ? 'bg-purple-50 text-purple-700 border border-purple-200' : 'bg-slate-50 text-slate-700 border border-slate-200'}`;
                    span.innerHTML = `${a.name} ${a.isHidden ? '<span class="text-[10px] ml-1 opacity-70">(隱藏)</span>' : ''}`;
                    span.addEventListener('click', () => showAbilityModal(a.name, a.effect));
                    abilitiesContainer.appendChild(span);
                });

                const statsHtml = Object.entries(mon.stats).map(([key, base]) => {
                    const label = key.toUpperCase();
                    const isHp = key === 'hp';
                    const min = calculateStat(base, 0, 0, 1.0, isHp);
                    const max = calculateStat(base, 252, 31, isHp ? 1.0 : 1.1, isHp);
                    const color = { hp: 'bg-green-500', atk: 'bg-red-500', def: 'bg-orange-500', spa: 'bg-blue-500', spd: 'bg-purple-500', spe: 'bg-pink-500' }[key];
                    const percent = Math.min((max / 260) * 100, 100);
                    return `
                        <div class="flex flex-col">
                            <div class="flex justify-between items-end text-xs mb-1">
                                <div class="flex items-center gap-2">
                                    <span class="font-black text-slate-700 w-8">${label}</span>
                                    <span class="text-slate-400 font-mono text-[10px]">種族 ${base}</span>
                                </div>
                                <span class="font-bold text-slate-600 font-mono">${min} <span class="text-slate-300">~</span> ${max}</span>
                            </div>
                            <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full ${color}" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');
                document.getElementById('dex-stats').innerHTML = statsHtml;
            }

            function updateCalculator() {
                const atkMon = pokemonDB[atkIndex];
                const defMon = pokemonDB[defIndex];
                if(!atkMon || !defMon) return;

                const atkStatKey = document.getElementById('calc-atk-stat').value;
                const isPhysical = atkStatKey === 'atk';
                const actualAtkStat = calculateStat(atkMon.stats[atkStatKey], parseInt(document.getElementById('calc-atk-ev').value)||0, parseInt(document.getElementById('calc-atk-iv').value)||0, parseFloat(document.getElementById('calc-atk-nature').value), false);
                document.getElementById('calc-atk-actual').innerText = actualAtkStat;

                const actualDefHp = calculateStat(defMon.stats.hp, parseInt(document.getElementById('calc-def-hp-ev').value)||0, parseInt(document.getElementById('calc-def-hp-iv').value)||0, 1.0, true);
                const actualDefStat = calculateStat(defMon.stats[document.getElementById('calc-def-stat').value], parseInt(document.getElementById('calc-def-ev').value)||0, parseInt(document.getElementById('calc-def-iv').value)||0, parseFloat(document.getElementById('calc-def-nature').value), false);
                
                document.getElementById('calc-def-hp-actual').innerText = actualDefHp;
                document.getElementById('calc-def-actual').innerText = actualDefStat;

                const { minDmg, maxDmg } = calculateDamage({
                    level: 50, power: parseInt(document.getElementById('calc-move-power').value) || 0,
                    atkStat: actualAtkStat, atkStage: parseInt(document.getElementById('calc-atk-stage').value), atkItem: document.getElementById('calc-atk-item').value, isBurned: document.getElementById('calc-atk-burn').checked, isPhysical,
                    defStat: actualDefStat, defStage: 0, defItem: '1', 
                    effectiveness: parseFloat(document.getElementById('calc-effectiveness').value), stab: parseFloat(document.getElementById('calc-stab').value), weather: parseFloat(document.getElementById('calc-field-boost').value)
                });
                
                const minPct = actualDefHp > 0 ? ((minDmg / actualDefHp) * 100).toFixed(1) : 0;
                const maxPct = actualDefHp > 0 ? ((maxDmg / actualDefHp) * 100).toFixed(1) : 0;

                document.getElementById('calc-dmg-min').innerText = minDmg;
                document.getElementById('calc-dmg-max').innerText = maxDmg;
                document.getElementById('calc-pct-min').innerText = minPct;
                document.getElementById('calc-pct-max').innerText = maxPct;

                const badge = document.getElementById('calc-result-badge');
                if (minDmg >= actualDefHp) { badge.innerText = "100% 確一 (OHKO)"; badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-red-500 text-white shadow-sm"; } 
                else if (maxDmg >= actualDefHp) { badge.innerText = "亂數一擊殺"; badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-yellow-500 text-white shadow-sm"; } 
                else if (minDmg * 2 >= actualDefHp) { badge.innerText = "確定二擊殺 (2HKO)"; badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-orange-500 text-white shadow-sm"; } 
                else { badge.innerText = "三擊以上"; badge.className = "px-2 py-0.5 rounded text-xs font-bold bg-slate-600 text-white shadow-sm"; }
            }

            const calcInputs = ['calc-atk-stat', 'calc-atk-ev', 'calc-atk-iv', 'calc-atk-nature', 'calc-atk-stage', 'calc-atk-item', 'calc-atk-burn', 'calc-def-hp-ev', 'calc-def-hp-iv', 'calc-def-stat', 'calc-def-ev', 'calc-def-iv', 'calc-def-nature', 'calc-move-power', 'calc-field-boost', 'calc-effectiveness', 'calc-stab'];
            calcInputs.forEach(id => document.getElementById(id).addEventListener('input', updateCalculator));

            document.getElementById('tab-pokedex').addEventListener('click', (e) => {
                document.getElementById('view-pokedex').classList.remove('hidden'); document.getElementById('view-calculator').classList.add('hidden');
                e.currentTarget.classList.replace('text-slate-400', 'text-emerald-600'); document.getElementById('tab-calculator').classList.replace('text-emerald-600', 'text-slate-400');
            });
            document.getElementById('tab-calculator').addEventListener('click', (e) => {
                document.getElementById('view-pokedex').classList.add('hidden'); document.getElementById('view-calculator').classList.remove('hidden');
                e.currentTarget.classList.replace('text-slate-400', 'text-emerald-600'); document.getElementById('tab-pokedex').classList.replace('text-emerald-600', 'text-slate-400');
                updateCalculator();
            });

            // 【第一步】立刻使用本地備用的 Z-A 資料庫初始化並繪製介面，避免畫面卡住空白
            setupAutocomplete(dexSearch, 'pokedex-dropdown', (idx) => { dexIndex = idx; renderPokedex(); }, 0);
            setupAutocomplete(atkSearch, 'calc-atk-dropdown', (idx) => { atkIndex = idx; updateCalculator(); }, 0);
            setupAutocomplete(defSearch, 'calc-def-dropdown', (idx) => { defIndex = idx; updateCalculator(); }, pokemonDB.length > 1 ? 1 : 0);
            renderPokedex();
            updateCalculator();
            
            dexSearch.placeholder = "正在連線 2026 最新資料庫...";

            // 【第二步】背景非同步抓取大型 API 資料庫
            (async () => {
                try {
                    const query = `
                    query {
                      pokemon_v2_pokemon(order_by: {id: asc}, limit: 500) {
                        id name is_default
                        pokemon_v2_pokemonstats { base_stat pokemon_v2_stat { name } }
                        pokemon_v2_pokemontypes { pokemon_v2_type { name } }
                        pokemon_v2_pokemonspecy {
                          id pokemon_v2_pokemonspeciesnames(where: {language_id: {_eq: 4}}) { name }
                        }
                        pokemon_v2_pokemonabilities {
                          is_hidden
                          pokemon_v2_ability {
                            name pokemon_v2_abilitynames(where: {language_id: {_eq: 4}}) { name }
                            pokemon_v2_abilityflavortexts(where: {language_id: {_eq: 4}}, limit: 1) { flavor_text }
                          }
                        }
                      }
                      pokemon_v2_pokemonspecies { id evolves_from_species_id }
                    }`;
                    
                    const response = await fetch('https://beta.pokeapi.co/graphql/v1beta', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query })
                    });
                    
                    const { data } = await response.json();
                    const preEvoSpeciesIds = new Set();
                    data.pokemon_v2_pokemonspecies.forEach(s => { if (s.evolves_from_species_id) preEvoSpeciesIds.add(s.evolves_from_species_id); });

                    const typeTranslations = { "normal": "一般", "fire": "火", "water": "水", "grass": "草", "electric": "電", "ice": "冰", "fighting": "格鬥", "poison": "毒", "ground": "地面", "flying": "飛行", "psychic": "超能力", "bug": "蟲", "rock": "岩石", "ghost": "幽靈", "dragon": "龍", "dark": "惡", "steel": "鋼", "fairy": "妖精" };
                    const invalidSuffixes = ['-gmax', '-totem', '-cap', '-cosplay', '-star', '-spiky'];

                    const apiPokemonList = [];
                    data.pokemon_v2_pokemon.forEach(p => {
                        const speciesId = p.pokemon_v2_pokemonspecy.id;
                        if (preEvoSpeciesIds.has(speciesId)) return;
                        if (invalidSuffixes.some(suffix => p.name.includes(suffix))) return;

                        const zhNameObj = p.pokemon_v2_pokemonspecy.pokemon_v2_pokemonspeciesnames[0];
                        const baseZhName = zhNameObj ? zhNameObj.name : p.name;
                        const finalName = p.is_default ? baseZhName : formatVariantName(p.name, baseZhName);
                        
                        const types = p.pokemon_v2_pokemontypes.map(t => typeTranslations[t.pokemon_v2_type.name] || t.pokemon_v2_type.name);
                        const statsArr = p.pokemon_v2_pokemonstats;
                        
                        const abilities = p.pokemon_v2_pokemonabilities.map(a => {
                            const zhAbility = a.pokemon_v2_ability.pokemon_v2_abilitynames[0];
                            const flavorText = a.pokemon_v2_ability.pokemon_v2_abilityflavortexts[0];
                            return {
                                name: zhAbility ? zhAbility.name : a.pokemon_v2_ability.name,
                                effect: flavorText ? flavorText.flavor_text.replace(/\n|\f/g, ' ') : "此特性的詳細說明尚未解鎖。",
                                isHidden: a.is_hidden
                            };
                        });

                        apiPokemonList.push({
                            name: finalName, types, abilities,
                            stats: {
                                hp: statsArr.find(s => s.pokemon_v2_stat.name === 'hp').base_stat, atk: statsArr.find(s => s.pokemon_v2_stat.name === 'attack').base_stat,
                                def: statsArr.find(s => s.pokemon_v2_stat.name === 'defense').base_stat, spa: statsArr.find(s => s.pokemon_v2_stat.name === 'special-attack').base_stat,
                                spd: statsArr.find(s => s.pokemon_v2_stat.name === 'special-defense').base_stat, spe: statsArr.find(s => s.pokemon_v2_stat.name === 'speed').base_stat,
                            },
                            sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`
                        });
                    });

                    // 合併 Z-A 資料庫與最新載入的 API 資料
                    pokemonDB = [...zaExclusives, ...apiPokemonList];

                    dexSearch.placeholder = `搜尋 ${pokemonDB.length} 隻對戰型態...`;
                    atkSearch.placeholder = "搜尋攻擊方...";
                    defSearch.placeholder = "搜尋防禦方...";
                } catch (err) {
                    console.error("API 載入失敗", err);
                    dexSearch.placeholder = "搜尋 (目前為離線備用模式)";
                }
            })(); // 背景執行，不阻擋畫面
        });
    </script>
</body>
</html>
